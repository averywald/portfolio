<div class="wrapper" id="outer-wrapper">
    <app-sidebar [sections]="sections"></app-sidebar>
    
    <div class="wrapper" id="content-wrapper">
      <app-title-header></app-title-header>
  
      <app-section-container 
        *ngFor="let s of sections;" 
        [section-id]="s"
        [logged-in]="loggedIn()">
      </app-section-container>

      <app-editor *ngIf="loggedIn()" [type]="editorType"></app-editor>
    </div>
  </div>
