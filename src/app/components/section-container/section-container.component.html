<div id="shell">
    <div id="titleWrapper" class="wrapper">
        <h2 id="title"> {{ title }} </h2>
    </div>
    <div id="blurbWrapper" class="wrapper">
        <app-section-blurb *ngFor="let b of blurbs;" [blurb-data]="b"></app-section-blurb>
    </div>
    <div *ngIf="this.editorMode" id="newBlurbWrapper" class="wrapper">
        <app-editor [type]="editorType"></app-editor>
    </div>
</div>
